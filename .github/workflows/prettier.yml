name: Format
on: [pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "yarn"

      - name: Install dependencies
        run: |
          npm install -g corepack
          corepack enable
          yarn install --immutable --immutable-cache

      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: v1-${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-nextjs-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.md', '**/*.css') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ steps.setup-node.outputs.node-version }}-nextjs-${{ hashFiles('**/yarn.lock') }}-

      - name: Format with Prettier
        run: yarn format

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Formatted files with Prettier"
